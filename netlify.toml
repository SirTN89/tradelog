[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Required environment variables (Netlify dashboard → Site settings → Environment variables):
#   CLERK_PUBLISHABLE_KEY = pk_live_...   (from Clerk dashboard → API Keys)
#   CLERK_SECRET_KEY      = sk_live_...   (from Clerk dashboard → API Keys)

[[edge_functions]]
  function = "inject-clerk-key"
  path = "/"
